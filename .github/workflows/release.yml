name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Needed to create the GitHub Release and upload the portable exe.
permissions:
  contents: write

jobs:
  release:
    name: Build portable exe (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Builds the frontend (beforeBuildCommand) and the release binary.
      # tauri.conf.json has `bundle.targets: []`, so no installer is produced —
      # only the standalone target/release/misclab-app.exe (relies on the
      # system WebView2 runtime, which ships with Windows 10/11).
      - name: Build app
        run: pnpm tauri build

      # Rename to a user-friendly, versioned name for the release asset.
      - name: Prepare portable exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          if ([string]::IsNullOrEmpty($version)) { $version = "dev" }
          $src = "target/release/misclab-app.exe"
          $dst = "LovelyMiscLab-$version-windows-x64.exe"
          Copy-Item $src $dst
          "ASSET=$dst" | Out-File -FilePath $env:GITHUB_ENV -Append

      # Shrink the standalone exe with UPX before publishing.
      - name: Compress with UPX
        shell: pwsh
        run: |
          choco install upx -y --no-progress
          $before = (Get-Item "${{ env.ASSET }}").Length
          upx --lzma --best "${{ env.ASSET }}"
          $after = (Get-Item "${{ env.ASSET }}").Length
          "UPX: {0:N0} -> {1:N0} bytes ({2:P1})" -f $before, $after, ($after / $before)

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "LovelyMiscLab ${{ github.ref_name }}"
          body: |
            单文件绿色版，免安装（已用 UPX --lzma --best 压缩）。下载后双击 `${{ env.ASSET }}` 即可运行。

            > 依赖系统自带的 WebView2 运行时（Windows 10/11 已内置）。

            ---
          append_body: true
          generate_release_notes: true
          draft: true
          prerelease: false
          files: ${{ env.ASSET }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
