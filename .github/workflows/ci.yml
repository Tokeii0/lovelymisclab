name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev libssl-dev \
            libayatana-appindicator3-dev libxdo-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Pinned (not @stable): a newer Clippy release must not spontaneously fail
      # the `-D warnings` gate below. Bump deliberately after a local clippy pass.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.93.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Builds ../dist, which the Tauri app crate embeds via generate_context!.
      - name: Frontend typecheck & build
        run: pnpm build

      # Zero-warning gate (matches CONTRIBUTING). After the frontend build so the
      # app crate's generate_context! can embed ../dist while linting --all-targets.
      - name: Clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Backend tests (misclab-core)
        run: cargo test -p misclab-core

      # Compiles the full Tauri app + runs the MCP integration test on every OS —
      # the real cross-platform guard (catches platform-specific breakage early).
      - name: App build & tests (misclab-app, mcp)
        run: cargo test -p misclab-app --features mcp
