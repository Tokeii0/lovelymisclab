<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="LovelyMiscLab — node-based visual workbench for CTF misc">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#151d33"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="300" rx="26" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="297" rx="24.5" fill="none" stroke="url(#accent)" stroke-opacity="0.22"/>

  <!-- node-graph motif: a small DAG -->
  <g stroke="url(#accent)" stroke-width="2.5" fill="none" opacity="0.5">
    <path d="M120 150 C 165 150, 170 92, 215 92"/>
    <path d="M120 150 C 165 150, 170 208, 215 208"/>
    <path d="M230 92 C 285 92, 285 150, 320 150"/>
    <path d="M230 208 C 285 208, 285 150, 320 150"/>
  </g>
  <g fill="url(#accent)" filter="url(#glow)">
    <circle cx="120" cy="150" r="15"/>
    <circle cx="222" cy="92" r="15"/>
    <circle cx="222" cy="208" r="15"/>
    <circle cx="330" cy="150" r="15"/>
  </g>
  <g fill="#0b1020">
    <circle cx="120" cy="150" r="5.5"/>
    <circle cx="222" cy="92" r="5.5"/>
    <circle cx="222" cy="208" r="5.5"/>
    <circle cx="330" cy="150" r="5.5"/>
  </g>

  <!-- wordmark -->
  <text x="410" y="140" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="-1.5" fill="#eaf0f8">LovelyMiscLab</text>
  <text x="413" y="182" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="23" font-weight="500" fill="#9aa7bd">Node-based visual workbench for CTF misc</text>
  <text x="413" y="210" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#6b7791">encoding &#183; steganography &#183; imaging &#183; crypto &#183; driven by AI over MCP</text>

  <!-- version pill -->
  <g transform="translate(414, 232)">
    <rect x="0" y="0" width="196" height="28" rx="14" fill="#8b5cf6" fill-opacity="0.12" stroke="url(#accent)" stroke-opacity="0.55"/>
    <text x="16" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13.5" fill="#c8bdf9">v0.2.0 &#183; Tauri + Rust + MCP</text>
  </g>
</svg>
